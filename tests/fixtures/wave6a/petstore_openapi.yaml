openapi: 3.0.0
info:
  title: Petstore
  version: "0.1.0"
servers:
  - url: https://api.example.test
paths:
  /pets:
    get:
      summary: List pets
      operationId: listPets
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200": { description: ok }
    post:
      summary: Create a pet
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Pet" }
            example:
              name: Rex
              tag: dog
      responses:
        "201": { description: created }
        "400": { description: bad request }
  /pets/{petId}:
    get:
      summary: Get a pet by id
      operationId: getPet
      parameters:
        - name: petId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: ok }
        "404": { description: not found }
components:
  schemas:
    Pet:
      type: object
      required: [name]
      properties:
        id:   { type: integer }
        name: { type: string }
        tag:  { type: string }
